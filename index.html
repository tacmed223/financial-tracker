<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Tracker Pro+</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
}

/* Summary */
.summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin:20px 0;
}

.card{
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.income{background:#16a34a;}
.expense{background:#dc2626;}
.balance{background:#2563eb;}
.month{background:#9333ea;}

/* Form */
form{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-bottom:15px;
}

input,select,button{
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* Search */
#search{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #334155;
}

.edit{
    background:orange;
    padding:5px;
    border:none;
    border-radius:5px;
}

.delete{
    background:red;
    padding:5px;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Financial Tracker Pro+</h1>

<div class="summary">
    <div class="card income">Income <h2 id="income">$0</h2></div>
    <div class="card expense">Expense <h2 id="expense">$0</h2></div>
    <div class="card balance">Balance <h2 id="balance">$0</h2></div>
    <div class="card month">This Month <h2 id="month">$0</h2></div>
</div>

<form id="form">
    <input id="desc" placeholder="Description" required>
    <input id="amount" type="number" placeholder="Amount" required>
    <input id="date" type="date" required>

    <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>

    <select id="category">
        <option>Food</option>
        <option>Bills</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Salary</option>
    </select>

    <button>Add</button>
</form>

<input id="search" placeholder="Search transactions">

<table>
<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>

<script>
let transactions = JSON.parse(localStorage.getItem("tx")) || [];

const form = document.getElementById("form");
const list = document.getElementById("list");

const incomeEl = document.getElementById("income");
const expenseEl = document.getElementById("expense");
const balanceEl = document.getElementById("balance");
const monthEl = document.getElementById("month");
const search = document.getElementById("search");

function save(){
    localStorage.setItem("tx", JSON.stringify(transactions));
}

function render(filter=""){
    list.innerHTML = "";

    let income = 0;
    let expense = 0;
    let monthly = 0;

    const currentMonth = new Date().getMonth();

    transactions
    .filter(t => t.desc.toLowerCase().includes(filter.toLowerCase()))
    .forEach((t,i)=>{

        const txMonth = new Date(t.date).getMonth();

        if(t.type === "income") income += t.amount;
        else expense += t.amount;

        if(txMonth === currentMonth){
            monthly += (t.type === "income" ? t.amount : -t.amount);
        }

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${t.date}</td>
            <td>${t.desc}</td>
            <td>${t.type}</td>
            <td>${t.category}</td>
            <td>$${t.amount.toFixed(2)}</td>
            <td>
                <button class="edit" onclick="editTx(${i})">Edit</button>
                <button class="delete" onclick="delTx(${i})">X</button>
            </td>
        `;

        list.appendChild(row);
    });

    incomeEl.textContent = "$" + income.toFixed(2);
    expenseEl.textContent = "$" + expense.toFixed(2);
    balanceEl.textContent = "$" + (income-expense).toFixed(2);
    monthEl.textContent = "$" + monthly.toFixed(2);

    save();
}

form.addEventListener("submit", e=>{
    e.preventDefault();

    transactions.push({
        desc:desc.value,
        amount:+amount.value,
        date:date.value,
        type:type.value,
        category:category.value
    });

    form.reset();
    render();
});

function delTx(i){
    transactions.splice(i,1);
    render();
}

function editTx(i){
    const t = transactions[i];

    desc.value = t.desc;
    amount.value = t.amount;
    date.value = t.date;
    type.value = t.type;
    category.value = t.category;

    transactions.splice(i,1);
    render();
}

search.addEventListener("input", e=>{
    render(e.target.value);
});

render();
</script>

</body>
</html>
